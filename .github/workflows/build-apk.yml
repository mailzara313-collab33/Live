name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version'
        required: false
        default: '3.27.4'
  push:
    branches:
      - claude/devsecops-audit-pipeline-6EiSk
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  FLUTTER_VERSION: ${{ github.event.inputs.flutter_version || '3.27.4' }}
  API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://ci.example.com/api' }}
  FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY || 'ci-placeholder' }}
  FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID || '1:000000000000:android:0000000000000000' }}
  FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || 'ci-mock-project' }}

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-36" "build-tools;35.0.0" || true
          # Install exact NDK version required by build.gradle
          sdkmanager "ndk;28.2.13676358" || \
            sdkmanager "ndk;27.0.12077973" || \
            echo "NDK install skipped — Gradle will auto-download"

      - name: Create mock google-services.json
        run: |
          mkdir -p android/app
          printf '%s' '{
  "project_info": {
    "project_number": "000000000000",
    "project_id": "ci-mock-project",
    "storage_bucket": "ci-mock-project.appspot.com"
  },
  "client": [
    {
      "client_info": {
        "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
        "android_client_info": {
          "package_name": "eShop.multivendor.customer"
        }
      },
      "oauth_client": [],
      "api_key": [{"current_key": "ci-mock-api-key"}],
      "services": {"appinvite_service": {"other_platform_oauth_client": []}}
    }
  ],
  "configuration_version": "1"
}' > android/app/google-services.json
          echo "google-services.json created:"
          cat android/app/google-services.json

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze (non-blocking)
        run: flutter analyze --no-fatal-warnings --no-fatal-infos || true

      - name: Build release APK
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=./debug-info/ \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=FIREBASE_API_KEY="$FIREBASE_API_KEY" \
            --dart-define=FIREBASE_APP_ID="$FIREBASE_APP_ID" \
            --dart-define=FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID"

      - name: Show APK info
        if: success()
        run: |
          APK=build/app/outputs/flutter-apk/app-release.apk
          ls -lh "$APK"
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "APK Size: $SIZE"
          echo "### Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| app-release.apk | $SIZE |" >> $GITHUB_STEP_SUMMARY

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-symbols-${{ github.sha }}
          path: debug-info/
          retention-days: 90
