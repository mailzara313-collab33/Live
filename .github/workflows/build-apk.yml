name: Build Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - claude/devsecops-audit-pipeline-6EiSk

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Create android/local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_HOME" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          cat android/local.properties

      - name: Install Android SDK extras
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager 'platforms;android-36' || true
          sdkmanager 'build-tools;35.0.0' || true
          sdkmanager 'ndk;28.2.13676358' || sdkmanager 'ndk;27.0.12077973' || echo 'NDK auto-download'

      - name: Create mock google-services.json
        run: |
          mkdir -p android/app
          cat > android/app/google-services.json << 'GSEOF'
          {"project_info":{"project_number":"000000000000","project_id":"ci-mock","storage_bucket":"ci-mock.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000000000","android_client_info":{"package_name":"eShop.multivendor.customer"}},"oauth_client":[],"api_key":[{"current_key":"ci-mock-key"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}
          GSEOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release APK
        env:
          SECRETS_API_URL: ${{ secrets.API_BASE_URL }}
          SECRETS_FB_KEY: ${{ secrets.FIREBASE_API_KEY }}
          SECRETS_FB_APP: ${{ secrets.FIREBASE_APP_ID }}
          SECRETS_FB_PROJ: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          API_URL="${SECRETS_API_URL:-https://ci.example.com/api}"
          FB_KEY="${SECRETS_FB_KEY:-ci-placeholder}"
          FB_APP="${SECRETS_FB_APP:-1:000000000000:android:0000000000000000}"
          FB_PROJ="${SECRETS_FB_PROJ:-ci-mock-project}"
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=./debug-info/ \
            --dart-define=API_BASE_URL="$API_URL" \
            --dart-define=FIREBASE_API_KEY="$FB_KEY" \
            --dart-define=FIREBASE_APP_ID="$FB_APP" \
            --dart-define=FIREBASE_PROJECT_ID="$FB_PROJ"

      - name: APK info
        if: success()
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-release-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-symbols-${{ github.sha }}
          path: debug-info/
          retention-days: 90
