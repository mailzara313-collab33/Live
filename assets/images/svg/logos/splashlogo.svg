<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="petcep-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#FFD166"/>
    </linearGradient>
  </defs>

  <!-- Circular gradient background -->
  <circle cx="100" cy="100" r="92" fill="url(#petcep-bg)"/>

  <!--
    P harfi: evenodd dolgu kuralı ile dış kontür + iç boşluk
    Dış yol: gövde (stem) + yay (bowl)
    İç yol: yayın içi (cutout)
  -->
  <path fill-rule="evenodd" fill="white" d="
    M 36,36
    L 54,36
    Q 116,36 116,69
    Q 116,102 54,102
    L 54,162
    L 36,162
    Z
    M 56,52
    L 68,52
    Q 96,52 96,69
    Q 96,86 68,86
    L 56,86
    Z
  "/>

  <!-- Pati izi — sağ alt köşe -->
  <!-- Parmak yastıkları (4 küçük oval) -->
  <circle cx="126" cy="128" r="10"  fill="white" opacity="0.88"/>
  <circle cx="143" cy="118" r="9"   fill="white" opacity="0.88"/>
  <circle cx="161" cy="121" r="9"   fill="white" opacity="0.88"/>
  <circle cx="169" cy="137" r="10"  fill="white" opacity="0.88"/>
  <!-- Ana pati yastığı -->
  <ellipse cx="148" cy="155" rx="18" ry="13" fill="white" opacity="0.88"/>
</svg>
