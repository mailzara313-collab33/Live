name: eshop_multivendor
description: eShop Multivendor App
publish_to: "none"

version: 3.2.0+50

environment:
  sdk: ">=3.10.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  # flutter_secure_storage: replaces SharedPreferences for sensitive keys
  # (TOKEN, FCMTOKEN, EMAIL, MOBILE, LATITUDE, LONGITUDE, IMAGE)
  # Uses Android Keystore / iOS Keychain under the hood.
  flutter_secure_storage: ^9.2.4
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5
  firebase_messaging: ^15.2.9
  flutter_rating_bar: ^4.0.1
  photo_view: ^0.15.0
  firebase_auth: ^5.6.2
  sms_autofill: ^2.4.1
  google_maps_flutter: ^2.14.0
  geolocator: ^14.0.2
  file_picker: ^10.3.3
  shimmer: ^3.0.0
  geocoding: ^4.0.0
  razorpay_flutter: ^1.4.0
  flutter_paystack: ^1.0.7
  flutter_html_to_pdf:
    git:
      url: https://github.com/mohammadhprp/flutter_html_to_pdf2
  permission_handler: ^12.0.1
  in_app_review: ^2.0.11
  open_file: ^3.5.10
  provider: ^6.1.5
  share_plus: ^11.0.0
  firebase_core: ^3.15.1
  video_player: ^2.10.1
  flutter_svg: ^2.2.0
  youtube_player_flutter: 9.1.1
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  sqflite: ^2.4.2
  version: ^3.0.2
  flutter_downloader: ^1.12.0
  speech_to_text: ^7.3.0
  tuple: ^2.0.2
  lottie: ^3.3.1
  flutter_stripe: ^12.0.2
  flutter_widget_from_html: ^0.16.0
  my_fatoorah:
    git: https://github.com/wrteam-aayush/my_fatoorah.git
  webview_flutter: ^4.13.0
  intl_phone_field: ^3.2.0
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7
  flutter_styled_toast: ^2.2.1
  paytmpayments_allinonesdk: ^1.0.4
  external_path: ^2.2.0
  flutter_bloc: ^9.1.1
  dio: ^5.9.0
  device_info_plus: ^12.3.0
  cached_network_image: ^3.4.1
  phonepe_payment_sdk: ^3.0.2
  app_links: ^6.1.1
  intl: ^0.20.2
  awesome_notifications: ^0.10.1
  country_pickers: ^3.0.1
  chewie: ^1.13.0
  hive: ^2.2.1
  hive_flutter: ^1.1.0
  readmore: ^3.0.0
  change_app_package_name: ^1.5.0
  http: ^1.4.0
  analyzer: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  file_picker:
    git:
      url: https://github.com/abdelaziz-mahdy/flutter_file_picker
      ref: fix-flutter-3.27-compile-error
  http:
  flutter_inappwebview: any
  intl: ^0.20.2
  flutter_paystack:
    git:
      url: https://github.com/I-driod/flutter_paystack.git
      ref: master

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icons/ic_launcher.png"
  adaptive_icon_foreground: "assets/images/icons/ic_launcher_transparent.png"
  adaptive_icon_background: "assets/images/icons/ic_launcher_background.png"
  remove_alpha_ios: true
  background_color_ios: "#FE7E7B"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/png/
    - assets/images/svg/
    - assets/images/svg/logos/
    - assets/animation/
    - assets/languages/
    - assets/images/flags/
    - assets/eShop.db
    - assets/countryCodes/

  fonts:
    - family: ubuntu
      fonts:
        - asset: assets/font/Ubuntu-Regular.ttf
        - asset: assets/font/NotoSans-Regular.ttf
        - asset: assets/font/NotoSans-Bold.ttf
          weight: 700
        - asset: assets/font/NotoSans-Medium.ttf
          weight: 500
